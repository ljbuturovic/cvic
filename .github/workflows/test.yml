name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest tests/ -v -x -k "not test_smoke"
